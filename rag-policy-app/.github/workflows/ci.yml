name: CI — Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify app imports correctly
        run: |
          python -c "import app; print('✅ App imports OK')"
        env:
          GROQ_API_KEY: dummy-key-for-import-check

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        continue-on-error: false

      - name: Health check (smoke test)
        run: |
          python -c "
          from app import app
          client = app.test_client()
          resp = client.get('/health')
          assert resp.status_code == 200, f'Health check failed: {resp.status_code}'
          data = resp.get_json()
          assert data['status'] == 'ok', f'Unexpected status: {data}'
          print('✅ /health endpoint OK')
          "
        env:
          GROQ_API_KEY: dummy-key-for-smoke-test

  # ── Optional: Deploy to Render on push to main ──────────────────────────────
